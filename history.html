<!DOCTYPE html>
<html>

<head>

<title>
Attendance History
</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="history.css">


</head>


<body>


<div class="container">


<h1>
📋 Attendance History
</h1>


<input 
type="text"
id="search"
placeholder="Search Student ID..."
onkeyup="searchAttendance()">



<table>


<thead>

<tr>

<th>
No.
</th>


<th>
Student QR ID
</th>


<th>
Date
</th>


<th>
Time
</th>


<th>
Status
</th>


</tr>

</thead>



<tbody id="attendanceTable">

</tbody>


</table>



<br>


<button onclick="clearHistory()">
DELETE ALL RECORDS
</button>



<button onclick="location.href='index.html'">
BACK HOME
</button>



</div>



<script>


let records =
JSON.parse(

localStorage.getItem(
"attendance"

)

)
|| [];



displayHistory();



function displayHistory()
{


let table =
document.getElementById(
"attendanceTable"
);



table.innerHTML="";



records.forEach(

(record,index)=>{


let row =
`
<tr>

<td>
${index+1}
</td>


<td>
${record.studentID}
</td>


<td>
${record.date}
</td>


<td>
${record.time}
</td>


<td>
<span class="present">
${record.status}
</span>
</td>


</tr>
`;



table.innerHTML += row;



}

);


}



function searchAttendance()
{


let keyword =
document
.getElementById(
"search"
)
.value
.toLowerCase();



let table =
document
.getElementById(
"attendanceTable"
);



table.innerHTML="";



records.forEach(

(record,index)=>{


if(

record.studentID
.toLowerCase()
.includes(keyword)

)

{


table.innerHTML +=

`

<tr>

<td>${index+1}</td>

<td>${record.studentID}</td>

<td>${record.date}</td>

<td>${record.time}</td>

<td>
<span class="present">
${record.status}
</span>
</td>


</tr>

`;

}


}

);



}




function clearHistory()
{


let confirmDelete =
confirm(
"Delete all attendance records?"
);



if(confirmDelete)
{


localStorage.removeItem(
"attendance"
);



records=[];



displayHistory();



alert(
"Attendance history deleted"
);


}



}



</script>


</body>

</html>
