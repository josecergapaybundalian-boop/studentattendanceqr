<!DOCTYPE html>
<html>

<head>

<title>
Student Database
</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="students.css">


</head>


<body>


<div class="container">


<h1>
👨‍🎓 Student Database
</h1>


<input 
type="text"
id="search"
placeholder="Search Student ID or Name..."
onkeyup="searchStudent()">



<table>


<thead>

<tr>

<th>No.</th>

<th>Student ID</th>

<th>Name</th>

<th>Class</th>

<th>QR ID</th>

<th>Action</th>


</tr>

</thead>



<tbody id="studentTable">


</tbody>


</table>



<br>


<button onclick="deleteAllStudents()">
DELETE ALL STUDENTS
</button>



<button onclick="location.href='register.html'">
REGISTER NEW STUDENT
</button>



<button onclick="location.href='index.html'">
BACK HOME
</button>



</div>




<script>


let students =
JSON.parse(

localStorage.getItem(
"students"

)

)
|| [];



displayStudents();





function displayStudents()
{


let table =
document.getElementById(
"studentTable"
);



table.innerHTML="";



students.forEach(

(student,index)=>{


table.innerHTML +=

`

<tr>

<td>
${index+1}
</td>


<td>
${student.id}
</td>


<td>
${student.name}
</td>


<td>
${student.class}
</td>


<td>
${student.qr}
</td>


<td>

<button 
onclick="deleteStudent(${index})">

Delete

</button>

</td>


</tr>

`;


}

);


}





function searchStudent()
{


let keyword =

document
.getElementById(
"search"
)
.value
.toLowerCase();



let table =
document.getElementById(
"studentTable"
);



table.innerHTML="";



students.forEach(

(student,index)=>{


if(

student.id
.toLowerCase()
.includes(keyword)

||

student.name
.toLowerCase()
.includes(keyword)

)

{


table.innerHTML +=

`

<tr>

<td>${index+1}</td>

<td>${student.id}</td>

<td>${student.name}</td>

<td>${student.class}</td>

<td>${student.qr}</td>

<td>

<button onclick="deleteStudent(${index})">

Delete

</button>

</td>


</tr>

`;

}


}

);


}




function deleteStudent(index)
{


let confirmDelete =

confirm(
"Delete this student?"
);



if(confirmDelete)
{


students.splice(index,1);



localStorage.setItem(

"students",

JSON.stringify(students)

);



displayStudents();



}



}





function deleteAllStudents()
{


let confirmDelete =

confirm(
"Delete all students?"
);



if(confirmDelete)
{


localStorage.removeItem(
"students"
);



students=[];



displayStudents();



alert(
"All student records deleted"
);


}



}


</script>



</body>


</html>
